<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="#f5f0eb"/>
  <!-- Hat crown -->
  <ellipse cx="16" cy="8" rx="8" ry="6.5" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
  <!-- Hat brim -->
  <rect x="8" y="13" width="16" height="2.5" rx="1" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
  <!-- Robot head -->
  <rect x="10" y="14" width="12" height="9" rx="2" fill="#1a1a2e"/>
  <!-- Eyes -->
  <rect x="11.5" y="16" width="3.5" height="3" rx="0.8" fill="white"/>
  <rect x="17" y="16" width="3.5" height="3" rx="0.8" fill="white"/>
  <!-- Smile -->
  <path d="M12.5 21 Q16 23 19.5 21" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Red collar -->
  <path d="M11 23 L16 26 L21 23 L19.5 22 L16 24.5 L12.5 22 Z" fill="#c0392b" stroke="#1a1a2e" stroke-width="0.8"/>
  <!-- Body -->
  <rect x="10.5" y="24" width="11" height="5" rx="1.5" fill="white" stroke="#1a1a2e" stroke-width="1"/>
</svg>
